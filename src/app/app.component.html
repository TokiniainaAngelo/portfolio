<app-scroll-progress />

<!-- Cursor spotlight (dark mode only) -->
<div
  class="spotlight"
  [style.background]="
    'radial-gradient(600px at ' + mouseX() + 'px ' + mouseY() + 'px, ' + (isDark ? 'rgba(29, 78, 216, 0.15)' : 'rgba(13, 148, 136, 0.15)') + ', transparent 80%)'
  "></div>

<router-outlet />

<!-- Easter Egg Toast -->
@if (easterEgg()) {
  <div class="fixed bottom-6 right-6 z-[100] px-5 py-3 rounded-lg bg-navy-light text-accent text-sm font-mono font-medium shadow-xl animate-fade-up border border-accent/20">
    Hey there, thanks for exploring!
  </div>
}
