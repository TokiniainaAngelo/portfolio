<button
  (click)="theme.toggle()"
  class="relative p-2 rounded text-slate-500 dark:text-slate-custom-dark hover:text-teal-600 dark:hover:text-accent transition-colors"
  [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
>
  <!-- Sun -->
  <svg
    class="w-4 h-4 transition-all duration-300"
    [class.rotate-0]="!theme.isDark()"
    [class.rotate-90]="theme.isDark()"
    [class.scale-100]="!theme.isDark()"
    [class.scale-0]="theme.isDark()"
    [class.opacity-100]="!theme.isDark()"
    [class.opacity-0]="theme.isDark()"
    [class.absolute]="theme.isDark()"
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor"
    stroke-width="2"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
    />
  </svg>

  <!-- Moon -->
  <svg
    class="w-4 h-4 transition-all duration-300"
    [class.rotate-0]="theme.isDark()"
    [class.-rotate-90]="!theme.isDark()"
    [class.scale-100]="theme.isDark()"
    [class.scale-0]="!theme.isDark()"
    [class.opacity-100]="theme.isDark()"
    [class.opacity-0]="!theme.isDark()"
    [class.absolute]="!theme.isDark()"
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor"
    stroke-width="2"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
    />
  </svg>
</button>
