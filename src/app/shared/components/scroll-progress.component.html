<div
  class="fixed top-0 left-0 z-[60] h-[2px] bg-teal-600 dark:bg-accent transition-[width] duration-150 ease-out"
  [style.width.%]="scroll.scrollProgress() * 100"
  role="progressbar"
  [attr.aria-valuenow]="Math.round(scroll.scrollProgress() * 100)"
  aria-valuemin="0"
  aria-valuemax="100"
  aria-label="Page scroll progress"
></div>
