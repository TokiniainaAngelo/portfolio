<div>
  <!-- Greeting -->
  <p class="font-mono text-teal-600 dark:text-accent mb-5 animate-fade-in" style="animation-delay: 100ms; animation-fill-mode: both">
    {{ t().hero.greeting }}
  </p>

  <!-- Name -->
  <h1
    class="text-4xl sm:text-5xl font-bold tracking-tight text-slate-900 dark:text-slate-custom-lightest leading-tight mb-3 animate-fade-up"
    style="animation-delay: 200ms; animation-fill-mode: both"
  >
    {{ t().hero.name }} Ramananjoelina.
  </h1>

  <!-- Title -->
  <h2
    class="text-3xl sm:text-4xl font-bold tracking-tight text-slate-500 dark:text-slate-custom leading-tight mb-6 animate-fade-up"
    style="animation-delay: 300ms; animation-fill-mode: both"
  >
    {{ t().hero.title }}
  </h2>

  <!-- Subtitle -->
  <p
    class="max-w-md text-slate-600 dark:text-slate-custom leading-relaxed animate-fade-up"
    style="animation-delay: 400ms; animation-fill-mode: both"
  >
    {{ t().hero.subtitle }}
  </p>
</div>
